name: Build and upload release assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and upload assets for; use the current version line such as v1.0.1 or an explicit prerelease/fix tag
        required: true
      confirm_overwrite_assets:
        description: Type true only after approving that existing assets for this tag may be overwritten
        required: true
        default: 'false'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      source_ref: ${{ steps.release.outputs.source_ref }}
    steps:
      - name: Validate release boundary and source
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          CONFIRM_OVERWRITE: ${{ inputs.confirm_overwrite_assets }}
        run: |
          tag="${INPUT_TAG:-$GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::This release workflow must use a semantic version tag such as v1.0.1, v1.0.1-fix1, or v1.0.1-rc1; got '$tag'."
            exit 1
          fi
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && [ "$CONFIRM_OVERWRITE" != "true" ]; then
            echo "::error::Manual dispatch requires confirm_overwrite_assets=true because existing release assets may be overwritten."
            exit 1
          fi

          source_ref="$GITHUB_REF"
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            set +e
            remote_tag=$(git ls-remote --exit-code --tags "https://github.com/${GITHUB_REPOSITORY}.git" "refs/tags/${tag}")
            remote_status=$?
            set -e
            if [ "$remote_status" -eq 0 ] && [ -n "$remote_tag" ]; then
              source_ref="$tag"
              echo "::notice::Existing tag ${tag} will be rebuilt from its tagged commit."
            elif [ "$remote_status" -eq 2 ]; then
              source_ref="$GITHUB_SHA"
              echo "::notice::New tag ${tag} will be created from ${GITHUB_SHA}."
            else
              echo "::error::Unable to inspect remote tag ${tag}; git ls-remote exited ${remote_status}."
              exit 1
            fi
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "source_ref=$source_ref" >> "$GITHUB_OUTPUT"
          echo "::notice::Release boundary accepted for ${tag}; source ref is ${source_ref}."

  build:
    needs: prepare
    name: ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            runner: windows-latest
            cgo: '1'
          - goos: windows
            goarch: arm64
            runner: windows-latest
            cgo: '1'
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            cgo: '1'
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            cgo: '1'
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            cgo: '0'
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            cgo: '0'

    steps:
      - name: Checkout release source
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.source_ref }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Verify and build web
        shell: bash
        run: |
          cd web
          npm ci || npm install
          npm run verify

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          mkdir -p dist/cmd
          mkdir -p dist/cmd/frontends
          cp cmd/frontends/worldline.py dist/cmd/frontends/worldline.py
          go run ./cmd/package-chat-runtime --worker cmd/chat_worker.py --worldline cmd/frontends/worldline.py --output dist/cmd/chat_worker.py
          tag="$RELEASE_TAG"
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w -X genericagent-admin-go/internal/version.Version=${tag} -X genericagent-admin-go/internal/version.Commit=${COMMIT} -X genericagent-admin-go/internal/version.Date=${BUILD_DATE}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            go build -ldflags="$LDFLAGS -H=windowsgui" -o dist/ga-admin.exe .
          else
            go build -ldflags="$LDFLAGS" -o dist/ga-admin .
          fi

      - name: Verify packaged chat runtime
        shell: bash
        run: |
          python -c "compile(open('dist/cmd/chat_worker.py', encoding='utf-8').read(), 'chat_worker.py', 'exec'); compile(open('dist/cmd/frontends/worldline.py', encoding='utf-8').read(), 'worldline.py', 'exec')"
          PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=dist/cmd python -c "from frontends.worldline import RewindStore, restore_plan, tree_from_store; print('worldline runtime ok')"
          mkdir -p dist/legacy-upgrade/cmd
          cp dist/cmd/chat_worker.py dist/legacy-upgrade/cmd/chat_worker.py
          PYTHONDONTWRITEBYTECODE=1 python dist/legacy-upgrade/cmd/chat_worker.py </dev/null
          test -f dist/legacy-upgrade/cmd/frontends/worldline.py
          rm -rf dist/legacy-upgrade

      - name: Package
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          tag="$RELEASE_TAG"
          version="${tag#v}"
          name="ga-admin-${tag}-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p package "$name"
          cp -R dist/* "$name"/
          cat > "$name/README.txt" <<EOF
          GenericAgent Admin Go ${tag}

          Run ga-admin.exe on Windows, or ga-admin on macOS/Linux.
          Linux servers without DISPLAY/Wayland enter headless mode automatically; use --headless or GA_ADMIN_HEADLESS=1 to force it.
          The executable embeds the React/Vite web UI.
          GenericAgent services still require your local GenericAgent Python environment.
          EOF
          if [ "${{ matrix.goos }}" = "windows" ]; then
            powershell -NoProfile -Command "Compress-Archive -Path '$name/*' -DestinationPath 'package/$name.zip' -Force"
          else
            zip -r "package/$name.zip" "$name"
          fi
          cd package
          python -c "import hashlib, pathlib; [p.with_suffix(p.suffix + '.sha256').write_text(hashlib.sha256(p.read_bytes()).hexdigest() + '  ' + p.name + '\\n', encoding='utf-8') for p in pathlib.Path('.').glob('*.zip')]"

      - name: Upload packaged asset
        uses: actions/upload-artifact@v5
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: package/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v5
        with:
          pattern: release-*
          path: package
          merge-multiple: true

      - name: Verify release assets
        shell: bash
        run: |
          find package -maxdepth 1 -type f -print | sort
          test "$(find package -maxdepth 1 -type f -name '*.zip' | wc -l)" -eq 6
          test "$(find package -maxdepth 1 -type f -name '*.zip.sha256' | wc -l)" -eq 6

      - name: Create tag and publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ contains(needs.prepare.outputs.tag, '-alpha') || contains(needs.prepare.outputs.tag, '-beta') || contains(needs.prepare.outputs.tag, '-rc') }}
          files: package/*
          fail_on_unmatched_files: true
          overwrite_files: true
